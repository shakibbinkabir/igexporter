<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <h2>Icon Generator for Instagram Chat Exporter</h2>
  <p>Right-click each icon and save as PNG to the icons folder:</p>

  <div style="display: flex; gap: 20px; margin-top: 20px;">
    <div>
      <p>icon16.png:</p>
      <canvas id="icon16" width="16" height="16"></canvas>
    </div>
    <div>
      <p>icon48.png:</p>
      <canvas id="icon48" width="48" height="48"></canvas>
    </div>
    <div>
      <p>icon128.png:</p>
      <canvas id="icon128" width="128" height="128"></canvas>
    </div>
  </div>

  <div style="margin-top: 30px;">
    <button onclick="downloadAll()">Download All Icons</button>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      // Create gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#833ab4');
      gradient.addColorStop(0.5, '#fd1d1d');
      gradient.addColorStop(1, '#fcb045');

      // Draw rounded rectangle
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw chat lines
      ctx.strokeStyle = 'white';
      ctx.lineCap = 'round';
      ctx.lineWidth = size * 0.08;

      const margin = size * 0.25;
      const lineSpacing = size * 0.22;

      // Line 1
      ctx.beginPath();
      ctx.moveTo(margin, margin);
      ctx.lineTo(size - margin, margin);
      ctx.stroke();

      // Line 2
      ctx.beginPath();
      ctx.moveTo(margin, margin + lineSpacing);
      ctx.lineTo(size - margin - size * 0.12, margin + lineSpacing);
      ctx.stroke();

      // Line 3
      ctx.beginPath();
      ctx.moveTo(margin, margin + lineSpacing * 2);
      ctx.lineTo(size - margin - size * 0.06, margin + lineSpacing * 2);
      ctx.stroke();

      return canvas;
    }

    function downloadCanvas(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadAll() {
      downloadCanvas('icon16', 'icon16.png');
      setTimeout(() => downloadCanvas('icon48', 'icon48.png'), 100);
      setTimeout(() => downloadCanvas('icon128', 'icon128.png'), 200);
    }

    // Draw all icons
    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
