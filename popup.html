<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: -apple-system, system-ui, sans-serif; padding: 16px; margin: 0; color: #333; }
    h2 { margin: 0 0 16px; font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .status { background: #f0f2f5; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-align: center; }
    .btn:disabled { background: #b2dffc; cursor: not-allowed; }
    .btn:hover:not(:disabled) { background: #1877f2; }
    #error { color: #ed4956; display: none; margin-top: 12px; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
    .info-row { display: flex; justify-content: space-between; }
    .label { color: #737373; }
    .value { font-weight: 600; }
  </style>
</head>
<body>
  <h2>IG Exporter</h2>
  <div class="status">
    <div class="info-row"><span class="label">Status:</span> <span class="value" id="statusText">Waiting...</span></div>
    <div class="info-row"><span class="label">Messages:</span> <span class="value" id="msgCount">0</span></div>
  </div>
  <button id="exportBtn" class="btn" disabled>Export JSON</button>
  <div id="error"></div>
  <script src="popup.js"></script>
</body>
</html>
